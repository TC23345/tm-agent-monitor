appId: com.taylormade.agent-monitor
productName: TaylorMade Agent Monitor
directories:
  output: dist
  buildResources: build
files:
  - out/**
  - "!**/*.map"
# koffi is a native module loaded at runtime — it must live outside the asar.
asarUnpack:
  - "**/node_modules/koffi/**"
# Ship the tray/app PNGs so the installed app finds them at process.resourcesPath.
extraResources:
  - from: resources
    to: .
    filter:
      - "*.png"
win:
  target:
    - nsis
    - portable
  icon: build/icon.ico
  artifactName: tm-agent-monitor-${version}-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: TaylorMade Agent Monitor
portable:
  artifactName: tm-agent-monitor-${version}-portable.exe
# Auto-update feed: GitHub Releases on this repo. The repo must be PUBLIC so the
# app can read latest.yml without a token. (Make it public, or point this at a
# separate public releases repo to keep the code private.)
publish:
  provider: github
  owner: TC23345
  repo: tm-agent-monitor
  releaseType: release # publish directly (not a draft) so auto-update sees it
